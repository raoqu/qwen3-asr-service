<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__DOC_TITLE__ - Qwen3-ASR Service</title>
<script src="/web-ui/assets/vendor/vue-3.5.35.global.prod.js"></script>
<script src="/web-ui/assets/vendor/naive-ui-2.44.1.prod.js"></script>
<link rel="stylesheet" href="/web-ui/assets/app.css">
</head>
<body>
<div id="app">
  <n-config-provider :theme="theme" :theme-overrides="themeOverrides">
    <n-global-style></n-global-style>
    <header class="appbar">
      <div class="appbar-inner">
        <a class="brand" href="/web-ui">
          <a-icon name="logo" size="20"></a-icon><span>Qwen3-ASR</span>
        </a>
        <nav class="appnav">
          <a href="/web-ui">离线转写</a>
          <a href="/web-ui/stream">实时转写</a>
          <a href="/web-ui/speakers">说话人</a>
          <a href="/web-ui/docs" class="active">文档</a>
        </nav>
        <div class="appbar-right">
          <n-tooltip trigger="hover">
            <template #trigger><span class="svc-dot" :class="svc.cls"></span></template>
            {{ svc.title }}
          </n-tooltip>
          <n-popover trigger="click" placement="bottom-end">
            <template #trigger>
              <button class="iconbtn" :class="{ 'has-key': hasKey }" title="API Key"><a-icon name="key"></a-icon></button>
            </template>
            <div style="width:240px;">
              <n-text depth="3" style="display:block;font-size:.78em;margin-bottom:6px;">API Key（留空表示无需认证）</n-text>
              <n-input v-model:value="apiKey" type="password" show-password-on="click" size="small" placeholder="sk-..."></n-input>
            </div>
          </n-popover>
          <button class="iconbtn" :title="themeLabel" @click="cycleTheme"><a-icon :name="themeIcon"></a-icon></button>
        </div>
      </div>
    </header>
    <div class="container">
      <div class="docs-layout">
        <!-- v-pre：导航与正文为服务端渲染 HTML，跳过 Vue 编译（文档内容可能含 {{ }} 等模板语法示例） -->
        <nav class="docs-sidebar" v-pre>__DOC_NAV__</nav>
        <main class="markdown-body" v-pre>__DOC_BODY__</main>
      </div>
    </div>
  </n-config-provider>
</div>
<script src="/web-ui/assets/common.js"></script>
<script>window.AsrCommon.mountApp();</script>
</body>
</html>
