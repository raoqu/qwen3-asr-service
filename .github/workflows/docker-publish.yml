name: Docker Publish

# 推送 vX.Y.Z 形式的 git tag 时触发，自动构建并推送镜像到 Docker Hub。
#
# 构建与打 tag 分离（方案 B）：
#   1. 各构建 job 并行执行，仅按 digest 推送 blob（push-by-digest，不挂人类可见 tag）；
#   2. 收尾 merge job 等全部构建完成后，用 imagetools 一次性挂上所有 tag，
#      使 Docker Hub 上各 tag 同时出现、顺序一致，且发布接近原子（任一构建失败则不挂 tag）。
#
# 镜像变体：
#   - GPU  (amd64)            -> :X.Y.Z        / :latest
#   - CPU  (amd64+arm64 多架构) -> :X.Y.Z-cpu    / :latest-cpu
#     CPU 变体为多架构 manifest：amd64 与 arm64 共用 Dockerfile.cpu，
#     拉取时 Docker 按本机架构自动选择（amd64→OpenVINO INT8，arm64→OpenVINO FP32，运行时自选）。
#   - vLLM (amd64)            -> :X.Y.Z-vllm   / :latest-vllm
#     vLLM 变体为 GPU 原生流式独立镜像（基底 vllm/vllm-openai），独立 build + merge-vllm，
#     构建失败不阻塞 GPU/CPU 发布。
on:
  push:
    tags:
      - 'v*.*.*'

env:
  IMAGE_NAME: lancelrq/qwen3-asr-service

jobs:
  # 从 tag 派生纯版本号（v2.0.1 -> 2.0.1），供各构建 job 复用
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.derive.outputs.version }}
    steps:
      - id: derive
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  gpu:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      # GPU 镜像解压后约 8-10GB，标准 runner 默认可用磁盘不足，先清理腾出 20-30GB
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest (GPU, amd64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          build-args: |
            APP_VERSION=${{ needs.setup.outputs.version }}
          # 仅推送 blob 并记录 digest，不挂 tag；关闭 provenance 以保持 manifest 干净
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          provenance: false

      - name: Export digest
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-gpu
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  cpu-amd64:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest (CPU, amd64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.cpu
          platforms: linux/amd64
          build-args: |
            APP_VERSION=${{ needs.setup.outputs.version }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          provenance: false

      - name: Export digest
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-cpu-amd64
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  cpu-arm64:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # arm64 在 amd64 runner 上通过 QEMU 模拟构建
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest (CPU, arm64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.cpu
          platforms: linux/arm64
          build-args: |
            APP_VERSION=${{ needs.setup.outputs.version }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          provenance: false

      - name: Export digest
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-cpu-arm64
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  vllm:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      # vLLM 镜像（基底 vllm/vllm-openai 约 9GB 压缩）解压后很大，先清理腾出磁盘
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest (vLLM, amd64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.vllm
          platforms: linux/amd64
          build-args: |
            APP_VERSION=${{ needs.setup.outputs.version }}
            VLLM_TAG=v0.14.0
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          provenance: false

      - name: Export digest
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-vllm
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # 全部构建完成后统一挂 tag：GPU 单架构、CPU 合并 amd64+arm64 为多架构 manifest
  merge:
    needs: [setup, gpu, cpu-amd64, cpu-arm64]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 解析各构建产物的 digest，组装多架构源引用
      - name: Resolve digests
        id: digests
        run: |
          gpu=$(ls "${RUNNER_TEMP}/digests/digests-gpu")
          amd64=$(ls "${RUNNER_TEMP}/digests/digests-cpu-amd64")
          arm64=$(ls "${RUNNER_TEMP}/digests/digests-cpu-arm64")
          {
            echo "gpu_src=${IMAGE_NAME}@sha256:${gpu}"
            echo "cpu_src_amd64=${IMAGE_NAME}@sha256:${amd64}"
            echo "cpu_src_arm64=${IMAGE_NAME}@sha256:${arm64}"
          } >> "$GITHUB_OUTPUT"

      # 推送顺序：版本号 -> 版本号-cpu -> latest -> latest-cpu（latest 最后推，时间戳最新）
      - name: Push version tags
        run: |
          docker buildx imagetools create -t "${IMAGE_NAME}:${VERSION}" \
            "${{ steps.digests.outputs.gpu_src }}"
          docker buildx imagetools create -t "${IMAGE_NAME}:${VERSION}-cpu" \
            "${{ steps.digests.outputs.cpu_src_amd64 }}" "${{ steps.digests.outputs.cpu_src_arm64 }}"

      - name: Push latest tags
        run: |
          docker buildx imagetools create -t "${IMAGE_NAME}:latest" \
            "${{ steps.digests.outputs.gpu_src }}"
          docker buildx imagetools create -t "${IMAGE_NAME}:latest-cpu" \
            "${{ steps.digests.outputs.cpu_src_amd64 }}" "${{ steps.digests.outputs.cpu_src_arm64 }}"

      - name: Inspect published tags
        run: |
          docker buildx imagetools inspect "${IMAGE_NAME}:${VERSION}"
          docker buildx imagetools inspect "${IMAGE_NAME}:${VERSION}-cpu"

  # vLLM 独立挂 tag：仅依赖 vllm 构建，与 gpu/cpu 的 merge 解耦，
  # vLLM 构建失败不影响 GPU/CPU 镜像发布
  merge-vllm:
    needs: [setup, vllm]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-vllm

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve digest
        id: digests
        run: |
          vllm=$(ls "${RUNNER_TEMP}/digests/digests-vllm")
          echo "vllm_src=${IMAGE_NAME}@sha256:${vllm}" >> "$GITHUB_OUTPUT"

      - name: Push vllm tags
        run: |
          docker buildx imagetools create -t "${IMAGE_NAME}:${VERSION}-vllm" \
            "${{ steps.digests.outputs.vllm_src }}"
          docker buildx imagetools create -t "${IMAGE_NAME}:latest-vllm" \
            "${{ steps.digests.outputs.vllm_src }}"

      - name: Inspect published tag
        run: |
          docker buildx imagetools inspect "${IMAGE_NAME}:${VERSION}-vllm"
